<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#0B0B12;font-family:var(--font-sans);color:var(--text-primary)}
  footer{padding:28px 32px;box-sizing:border-box;border-top:1px solid rgba(255,255,255,0.06);position:relative}
  footer::before{content:"";position:absolute;top:-1px;left:0;right:0;height:1px;background:var(--pld-gradient-h);opacity:0.4}
  .grid{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:32px}
  .brand{display:flex;flex-direction:column;gap:10px}
  .brand img{width:36px;height:36px;border-radius:50%}
  .bname{font-weight:700;font-size:14px}
  .tag{font-size:11px;color:var(--text-muted);max-width:220px;line-height:1.5}
  .col h4{margin:0 0 10px;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-muted);font-weight:500}
  .col a{display:block;font-size:12px;color:var(--text-secondary);text-decoration:none;margin-bottom:6px}
  .copy{margin-top:22px;font-size:11px;color:var(--text-muted);display:flex;justify-content:space-between}
</style>
</head>
<body>
<footer>
  <div class="grid">
    <div class="brand">
      <img src="../assets/logo-icon.png" alt=""/>
      <div class="bname">Peter Luke Digital</div>
      <div class="tag">Websites, SEO, and social for medical &amp; wellness practices.</div>
    </div>
    <div class="col"><h4>Services</h4><a>Website Rebuild</a><a>Logo Design</a><a>SEO</a><a>Social Media</a><a>Full Growth</a></div>
    <div class="col"><h4>Company</h4><a>About Pete</a><a>Case Studies</a><a>Contact</a></div>
    <div class="col"><h4>Contact</h4><a>peter@peterlukedigital.com</a><a>Book a call →</a></div>
  </div>
  <div class="copy"><span>© 2026 Peter Luke Digital.</span><span>All rights reserved.</span></div>
</footer>
</body></html>
