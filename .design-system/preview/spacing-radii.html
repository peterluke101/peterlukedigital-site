<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);font-family:var(--font-sans);color:var(--text-primary)}
  .card{padding:24px;box-sizing:border-box;display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:center}
  .row{display:flex;flex-direction:column;gap:10px}
  .lbl{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted)}
  .bar{display:flex;align-items:center;gap:10px}
  .seg{height:16px;background:var(--pld-blue);border-radius:3px}
  .meta{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--text-muted)}
  .radii{display:flex;gap:10px;align-items:flex-end}
  .box{background:var(--surface-elevated);border:1px solid var(--border);width:52px;height:52px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-size:10px;color:var(--text-muted);font-family:ui-monospace,Menlo,monospace}
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="lbl">Spacing · 4px base</div>
    <div class="bar"><div class="seg" style="width:4px"></div><span class="meta">4 · s-1</span></div>
    <div class="bar"><div class="seg" style="width:8px"></div><span class="meta">8 · s-2</span></div>
    <div class="bar"><div class="seg" style="width:16px"></div><span class="meta">16 · s-4</span></div>
    <div class="bar"><div class="seg" style="width:24px"></div><span class="meta">24 · s-6</span></div>
    <div class="bar"><div class="seg" style="width:48px"></div><span class="meta">48 · s-12</span></div>
    <div class="bar"><div class="seg" style="width:80px"></div><span class="meta">80 · s-20</span></div>
    <div class="bar"><div class="seg" style="width:128px"></div><span class="meta">128 · s-32</span></div>
  </div>
  <div class="row">
    <div class="lbl">Radii</div>
    <div class="radii">
      <div class="box" style="border-radius:4px">4</div>
      <div class="box" style="border-radius:6px">6</div>
      <div class="box" style="border-radius:8px">8★</div>
      <div class="box" style="border-radius:12px">12</div>
      <div class="box" style="border-radius:16px">16</div>
      <div class="box" style="border-radius:24px">24</div>
    </div>
    <div class="meta" style="margin-top:4px">★ button radius — brand rule</div>
  </div>
</div>
</body></html>
