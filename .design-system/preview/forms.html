<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);font-family:var(--font-sans);color:var(--text-primary)}
  .card{padding:22px;box-sizing:border-box;display:grid;grid-template-columns:1fr 1fr;gap:14px}
  label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);display:block;margin-bottom:6px}
  .field{background:#14141F;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:12px 14px;color:#fff;font-family:inherit;font-size:14px;width:100%;box-sizing:border-box;outline:none;transition:border-color 160ms,box-shadow 160ms}
  .field:focus{border-color:rgba(0,212,255,0.6);box-shadow:0 0 0 3px rgba(0,212,255,0.15)}
  .field::placeholder{color:#5A5A73}
  select.field{appearance:none;background-image:linear-gradient(45deg,transparent 50%,#8A8AA3 50%),linear-gradient(135deg,#8A8AA3 50%,transparent 50%);background-position:calc(100% - 16px) 50%,calc(100% - 12px) 50%;background-size:4px 4px,4px 4px;background-repeat:no-repeat}
  .check{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text-secondary)}
  .box{width:18px;height:18px;border-radius:4px;border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center}
  .box.on{background:#0066FF;border-color:#0066FF;color:#fff;font-size:12px}
</style>
</head>
<body>
<div class="card">
  <div><label>Practice Name</label><input class="field" placeholder="Juvenis Medical"></div>
  <div><label>Email</label><input class="field" placeholder="you@practice.com"></div>
  <div><label>Practice Type</label><select class="field"><option>Hormone / TRT</option></select></div>
  <div style="display:flex;flex-direction:column;gap:8px;justify-content:flex-end">
    <div class="check"><div class="box on">✓</div>Subscribe to monthly insights</div>
    <div class="check"><div class="box"></div>I'd like an audit</div>
  </div>
  <div style="grid-column:1/-1"><label>Notes</label><textarea class="field" rows="2" placeholder="What's the #1 issue with your current site?"></textarea></div>
</div>
</body></html>
