<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);font-family:var(--font-sans);color:var(--text-primary)}
  .card{padding:22px;box-sizing:border-box;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .cell{background:#14141F;border:1px solid var(--border);border-radius:10px;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
  .cell.white{background:#fff}
  .cell img{width:78%;height:78%;object-fit:contain}
  .lbl{position:absolute;bottom:6px;left:8px;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-muted)}
  .cell.white .lbl{color:#5A5A73}
</style>
</head>
<body>
<div class="card">
  <div class="cell"><img src="../assets/logo-primary.png" alt=""/><span class="lbl">Primary</span></div>
  <div class="cell"><img src="../assets/logo-mono.png" alt=""/><span class="lbl">Monochrome</span></div>
  <div class="cell white"><img src="../assets/logo-reversed.png" alt=""/><span class="lbl">Reversed</span></div>
  <div class="cell"><img src="../assets/logo-icon.png" alt=""/><span class="lbl">Icon</span></div>
</div>
</body></html>
