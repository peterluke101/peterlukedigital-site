<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);font-family:var(--font-sans);color:var(--text-primary)}
  .wrap{padding:14px;box-sizing:border-box}
  .nav{background:rgba(11,11,18,0.7);backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:10px 14px 10px 18px;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:24px}
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .brand img{width:28px;height:28px;border-radius:50%;flex-shrink:0}
  .name{font-weight:700;font-size:13px;letter-spacing:-0.01em;white-space:nowrap}
  .links{display:flex;gap:22px;font-size:13px;color:var(--text-secondary);justify-content:center}
  .links a{color:inherit;text-decoration:none;transition:color 160ms;white-space:nowrap}
  .links a:hover{color:#fff}
  .cta{background:#0066FF;color:#fff;border:0;border-radius:8px;padding:9px 14px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;letter-spacing:-0.01em}
  .cta:hover{background:#3385FF;box-shadow:0 0 30px -10px rgba(0,102,255,0.6)}
  .meta{margin-top:10px;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);padding-left:4px}
</style>
</head>
<body>
<div class="wrap">
  <nav class="nav">
    <div class="brand"><img src="../assets/logo-icon.png" alt=""/><span class="name">Peter Luke Digital</span></div>
    <div class="links"><a>Services</a><a>Case Study</a><a>About</a></div>
    <button class="cta">Book Free Audit</button>
  </nav>
  <div class="meta">Sticky · blur backdrop · logo left · links center · CTA right</div>
</div>
</body></html>
