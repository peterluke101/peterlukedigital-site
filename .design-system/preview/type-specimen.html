<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);font-family:var(--font-sans);color:var(--text-primary)}
  .card{padding:40px 32px;box-sizing:border-box}
  h1{margin:0;font-size:64px;font-weight:700;line-height:1.05;letter-spacing:-0.02em}
  .grad{background:var(--pld-gradient-h);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  p{margin:18px 0 0;font-size:17px;line-height:1.6;color:var(--text-secondary);max-width:560px}
</style>
</head>
<body>
<div class="card">
  <h1>Websites that rank, convert,<br/>and <span class="grad">run on autopilot.</span></h1>
  <p>A premium brand system for medical and wellness practices — designed for precision, trust, and patient acquisition.</p>
</div>
</body></html>
