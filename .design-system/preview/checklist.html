<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);font-family:var(--font-sans);color:var(--text-primary)}
  .card{padding:24px;box-sizing:border-box}
  .list{display:grid;grid-template-columns:1fr 1fr;gap:10px 28px}
  .item{display:flex;align-items:center;gap:12px;font-size:14px;color:var(--text-secondary)}
  .ring{width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(0,212,255,0.55);display:flex;align-items:center;justify-content:center;color:#00D4FF;font-size:13px;flex-shrink:0}
  .lbl{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px}
</style>
</head>
<body>
<div class="card">
  <div class="lbl">Who We Help · Checklist Style</div>
  <div class="list">
    <div class="item"><span class="ring">✓</span>Hormone &amp; TRT clinics</div>
    <div class="item"><span class="ring">✓</span>Peptide therapy</div>
    <div class="item"><span class="ring">✓</span>GLP-1 weight loss</div>
    <div class="item"><span class="ring">✓</span>Functional medicine</div>
    <div class="item"><span class="ring">✓</span>Longevity clinics</div>
    <div class="item"><span class="ring">✓</span>Telehealth practices</div>
  </div>
</div>
</body></html>
