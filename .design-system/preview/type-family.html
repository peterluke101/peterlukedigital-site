<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);font-family:var(--font-sans)}
  .card{padding:28px;color:var(--text-primary);box-sizing:border-box}
  .big{font-size:132px;line-height:1;letter-spacing:-0.03em;font-weight:700;background:var(--pld-gradient-h);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sub{margin-top:10px;font-size:13px;color:var(--text-muted);letter-spacing:0.12em;text-transform:uppercase}
  .name{margin-top:6px;font-size:22px;font-weight:500;color:var(--text-primary)}
  .row{display:flex;gap:18px;align-items:baseline;margin-top:16px;flex-wrap:wrap}
  .glyph{color:var(--text-secondary);font-size:16px;letter-spacing:0.06em}
</style>
</head>
<body>
<div class="card" style="display:flex;align-items:center;gap:40px">
  <div>
    <div class="big">Aa</div>
    <div class="name">Neurial Grotesk</div>
    <div class="sub">Space Grotesk · fallback</div>
  </div>
  <div style="flex:1">
    <div class="glyph">ABCDEFGHIJKLMNOPQRSTUVWXYZ</div>
    <div class="glyph" style="margin-top:4px">abcdefghijklmnopqrstuvwxyz</div>
    <div class="glyph" style="margin-top:4px">0123456789 · — → ✓</div>
  </div>
</div>
</body></html>
