<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);font-family:var(--font-sans)}
  .card{padding:24px;color:var(--text-primary);box-sizing:border-box}
  .row{display:flex;gap:12px;align-items:stretch}
  .swatch{flex:1;aspect-ratio:1.2/1;border-radius:10px;display:flex;flex-direction:column;justify-content:space-between;padding:10px;box-sizing:border-box;border:1px solid var(--border);font-size:11px;font-weight:500;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.6)}
  .swatch .hex{font-family:ui-monospace,Menlo,monospace;font-size:10px;opacity:0.9}
  .swatch .name{font-weight:600}
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="swatch" style="background:#00D4FF;color:#0B0B12;text-shadow:none"><span class="name">Cyan</span><span class="hex">#00D4FF</span></div>
    <div class="swatch" style="background:#0066FF"><span class="name">Blue</span><span class="hex">#0066FF</span></div>
    <div class="swatch" style="background:#00F5A0;color:#0B0B12;text-shadow:none"><span class="name">Green</span><span class="hex">#00F5A0</span></div>
    <div class="swatch" style="background:#8A2BFF"><span class="name">Purple</span><span class="hex">#8A2BFF</span></div>
    <div class="swatch" style="background:#FF00E0"><span class="name">Magenta</span><span class="hex">#FF00E0</span></div>
    <div class="swatch" style="background:#FFFFFF;color:#0B0B12;text-shadow:none"><span class="name">White</span><span class="hex">#FFFFFF</span></div>
    <div class="swatch" style="background:#0B0B12"><span class="name">Near-Black</span><span class="hex">#0B0B12</span></div>
  </div>
</div>
</body></html>
