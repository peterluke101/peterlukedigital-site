<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);font-family:var(--font-sans);color:var(--text-primary)}
  .wrap{padding:0;box-sizing:border-box;position:relative;overflow:hidden}
  .band{position:relative;padding:32px 32px;background:#0B0B12;border:1px solid rgba(255,255,255,0.06);border-radius:14px;margin:16px;overflow:hidden;display:flex;align-items:center;justify-content:space-between;gap:24px}
  .band::before{content:"";position:absolute;inset:-40% -20% auto auto;width:60%;height:200%;background:radial-gradient(ellipse,rgba(138,43,255,0.35),transparent 60%);pointer-events:none}
  .band::after{content:"";position:absolute;inset:auto auto -50% -20%;width:60%;height:200%;background:radial-gradient(ellipse,rgba(0,212,255,0.25),transparent 60%);pointer-events:none}
  .content{position:relative;z-index:1}
  h2{margin:0;font-size:26px;font-weight:700;letter-spacing:-0.02em;line-height:1.2}
  p{margin:6px 0 0;color:var(--text-secondary);font-size:13px}
  .cta{position:relative;z-index:1;background:#0066FF;color:#fff;border:0;border-radius:8px;padding:14px 22px;font-weight:700;font-size:14px;font-family:inherit;cursor:pointer;white-space:nowrap;box-shadow:0 0 40px -8px rgba(0,102,255,0.6)}
</style>
</head>
<body>
<div class="wrap">
  <div class="band">
    <div class="content">
      <h2>Is your website losing you patients?</h2>
      <p>Find out in 20 minutes — free, no obligation.</p>
    </div>
    <button class="cta">Book a Free 20-Min Audit</button>
  </div>
</div>
</body></html>
