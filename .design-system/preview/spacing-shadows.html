<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);font-family:var(--font-sans);color:var(--text-primary)}
  .card{padding:28px;box-sizing:border-box;display:grid;grid-template-columns:repeat(5,1fr);gap:16px;align-items:end}
  .box{background:#1C1C28;border:1px solid var(--border);border-radius:10px;width:100%;aspect-ratio:1/1;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font-size:10px;color:var(--text-muted);font-family:ui-monospace,Menlo,monospace}
  .lbl{font-size:11px;color:var(--text-muted);text-align:center;letter-spacing:0.08em;text-transform:uppercase;margin-top:8px}
</style>
</head>
<body>
<div class="card">
  <div><div class="box" style="box-shadow:0 1px 2px rgba(0,0,0,0.4)">sm</div><div class="lbl">shadow-sm</div></div>
  <div><div class="box" style="box-shadow:0 8px 24px -8px rgba(0,0,0,0.6), 0 2px 6px rgba(0,0,0,0.4)">md</div><div class="lbl">shadow-md</div></div>
  <div><div class="box" style="box-shadow:0 24px 60px -20px rgba(0,0,0,0.8), 0 4px 12px rgba(0,0,0,0.4)">lg</div><div class="lbl">shadow-lg</div></div>
  <div><div class="box" style="box-shadow:0 0 40px -8px rgba(0,102,255,0.6);border-color:rgba(0,102,255,0.35)">glow</div><div class="lbl">glow-blue</div></div>
  <div><div class="box" style="box-shadow:0 0 40px -8px rgba(138,43,255,0.55);border-color:rgba(138,43,255,0.35)">glow</div><div class="lbl">glow-purple</div></div>
</div>
</body></html>
