<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);font-family:var(--font-sans)}
  .card{padding:26px;color:var(--text-primary);box-sizing:border-box;display:grid;grid-template-columns:repeat(5,1fr);gap:16px;align-items:end}
  .col{display:flex;flex-direction:column;gap:8px}
  .big{font-size:72px;line-height:1;letter-spacing:-0.02em}
  .lbl{font-size:11px;color:var(--text-muted);letter-spacing:0.12em;text-transform:uppercase}
</style>
</head>
<body>
<div class="card">
  <div class="col"><div class="big" style="font-weight:300">Aa</div><div class="lbl">Light · 300</div></div>
  <div class="col"><div class="big" style="font-weight:400">Aa</div><div class="lbl">Regular · 400</div></div>
  <div class="col"><div class="big" style="font-weight:500">Aa</div><div class="lbl">Medium · 500</div></div>
  <div class="col"><div class="big" style="font-weight:700">Aa</div><div class="lbl">Bold · 700</div></div>
  <div class="col"><div class="big" style="font-weight:700;background:var(--pld-gradient-h);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent">Aa</div><div class="lbl">Black · 700*</div></div>
</div>
</body></html>
